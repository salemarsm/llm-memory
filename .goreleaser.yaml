version: 2

project_name: ginko

before:
  hooks:
    - go mod tidy

builds:
  - id: ginko
    main: ./cmd/ginko
    binary: ginko
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: ginko-admin
    main: ./cmd/ginko-admin
    binary: ginko-admin
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memctl
    main: ./cmd/memctl
    binary: memctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memmcp
    main: ./cmd/memmcp
    binary: memmcp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memserver
    main: ./cmd/memserver
    binary: memserver
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}

archives:
  - id: ginko-bundle
    builds:
      - ginko
      - ginko-admin
      - memctl
      - memmcp
      - memserver
    formats: [tar.gz]
    name_template: "ginko_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/whitepaper/ginko-whitepaper.pdf
      - docs/assets/ginko-brand.jpg

checksum:
  name_template: checksums.txt

dockers:
  - id: ginko-amd64
    goos: linux
    goarch: amd64
    ids: [ginko, ginko-admin, memctl, memmcp, memserver]
    image_templates:
      - "ghcr.io/salemarsm/ginko:{{ .Tag }}-amd64"
      - "ghcr.io/salemarsm/ginko:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/salemarsm/ginko"

  - id: ginko-arm64
    goos: linux
    goarch: arm64
    ids: [ginko, ginko-admin, memctl, memmcp, memserver]
    image_templates:
      - "ghcr.io/salemarsm/ginko:{{ .Tag }}-arm64"
      - "ghcr.io/salemarsm/ginko:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/salemarsm/ginko"

docker_manifests:
  - name_template: "ghcr.io/salemarsm/ginko:{{ .Tag }}"
    image_templates:
      - "ghcr.io/salemarsm/ginko:{{ .Tag }}-amd64"
      - "ghcr.io/salemarsm/ginko:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/salemarsm/ginko:latest"
    image_templates:
      - "ghcr.io/salemarsm/ginko:latest-amd64"
      - "ghcr.io/salemarsm/ginko:latest-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
